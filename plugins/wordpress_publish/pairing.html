<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-translate>WordPress Publish Pairing</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #13151a;
      color: #f3f6ff;
      line-height: 1.4;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.2rem;
    }

    h1, h2 {
      margin: 0 0 0.65rem;
    }

    p {
      margin: 0 0 1rem;
      color: #b7c0d8;
    }

    .panel {
      background: #1a1f2a;
      border: 1px solid #2e3445;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 0.85rem;
    }

    .field label {
      color: #d7ddf5;
      font-size: 0.92rem;
    }

    input[type="text"],
    input[type="password"] {
      background: #0f1218;
      color: #f3f6ff;
      border: 1px solid #394057;
      border-radius: 8px;
      padding: 0.6rem 0.7rem;
      font-size: 0.95rem;
    }

    .auth-row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 0.8rem;
    }

    .auth-row label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #d7ddf5;
      font-size: 0.92rem;
    }

    button {
      border: 1px solid #2f6ee9;
      background: #2f6ee9;
      color: #fff;
      border-radius: 8px;
      padding: 0.55rem 0.85rem;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button.secondary {
      border-color: #46506c;
      background: #232938;
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    #pairing-help-btn {
      position: fixed;
      top: 28px;
      right: 28px;
      z-index: 1001;
      padding: 0.4rem 0.8rem;
      font-size: 1rem;
      line-height: 1;
      min-width: 2.2rem;
    }

    .status {
      min-height: 1.2rem;
      color: #9fd2ff;
      margin-top: 0.3rem;
    }

    .status.error {
      color: #ff9999;
    }

    .paired-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.6rem;
    }

    .paired-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      border: 1px solid #2e3445;
      border-radius: 8px;
      padding: 0.65rem;
      background: #10141d;
    }
    .paired-actions {
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .menu-wrap {
      position: relative;
    }
    .menu-btn {
      min-width: 2.2rem;
      padding: 0.55rem 0.65rem;
      font-weight: 700;
    }
    .menu-popup {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: #1a2130;
      border: 1px solid #394057;
      border-radius: 8px;
      min-width: 130px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      padding: 0.35rem;
      z-index: 10;
      display: none;
    }
    .menu-popup.open {
      display: block;
    }
    .menu-popup button {
      display: block;
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      padding: 0.48rem 0.55rem;
      border-radius: 6px;
      font-size: 0.92rem;
    }
    .menu-popup button:hover {
      background: #2b3448;
    }
    .publish-btn {
      background: #157347;
      border-color: #157347;
    }
    .publish-btn:disabled {
      opacity: 0.5;
    }
    .publish-target {
      margin: 0.2rem 0 0.7rem;
      color: #b8d2bf;
      font-size: 0.9rem;
    }

    .paired-item small {
      display: block;
      color: #a8b3ce;
      margin-top: 0.15rem;
      word-break: break-all;
    }

    .empty {
      color: #9ba6c5;
      font-size: 0.95rem;
    }

    .hint {
      color: #9ba6c5;
      font-size: 0.86rem;
      margin-top: -0.35rem;
      margin-bottom: 0.8rem;
    }

    @media (max-width: 640px) {
      main {
        padding: 0.8rem;
      }

      .paired-item {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <button id="pairing-help-btn" type="button" title="Help">❔</button>
  <main>
    <section class="panel">
      <h1 data-translate>WordPress Publish</h1>
      <p data-translate>Publish the selected presentation to a paired WordPress destination.</p>
      <div id="publishTarget" class="publish-target"></div>
      <h2 data-translate>Destinations</h2>
      <ul id="pairedList" class="paired-list"></ul>
      <div id="emptyState" class="empty" data-translate>No sites paired yet.</div>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </section>

    <section class="panel">
      <h2 data-translate>Pair a New Site</h2>
      <div class="field">
        <label for="pairingUrlInput" data-translate>Pairing URL</label>
        <input id="pairingUrlInput" type="text" placeholder="https://example.org" />
      </div>

      <div class="hint" data-translate>After requesting pair, approve the attempt in WordPress Settings using the shown one-time code.</div>

      <button id="pairButton" type="button" data-translate>Pair Site</button>
    </section>
  </main>

  <script src="/js/translate.js"></script>
  <script src="./pairing.js"></script>
</body>
</html>
