<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Metadata</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/css/presentations.css" />
  <link rel="stylesheet" href="/admin/create-edit.css" />
</head>
<body>
  <div class="app-header">
    <div class="app-header-title">
      <h1>Edit Presentation Metadata</h1>
      <div class="presentation-file-path"><span id="presentation-file-path"></span></div>
    </div>
    <button id="metadata-help-btn" type="button" title="Help">❔</button>
  </div>

  <div class="tab-container-wrapper">
    <div class="tabs-container">
      <div class="tabs-header" role="tablist">
        <button class="tab-button" role="tab" aria-selected="true" aria-controls="tab-presentation" data-tab="presentation" data-translate="true">Presentation</button>
        <button class="tab-button" role="tab" aria-selected="false" aria-controls="tab-properties" data-tab="properties" data-translate="true">Properties</button>
        <button class="tab-button" role="tab" aria-selected="false" aria-controls="tab-media" data-tab="media" data-translate="true">Media</button>
        <button class="tab-button" role="tab" aria-selected="false" aria-controls="tab-macros" data-tab="macros" data-translate="true">Macros</button>
      </div>

      <form id="create-form">
        <div id="tab-presentation" class="tab-content" role="tabpanel" aria-labelledby="tab-presentation-btn"></div>
        <div id="tab-properties" class="tab-content" role="tabpanel" aria-labelledby="tab-properties-btn" hidden></div>
        <div id="tab-media" class="tab-content" role="tabpanel" aria-labelledby="tab-media-btn" hidden></div>
        <div id="tab-macros" class="tab-content" role="tabpanel" aria-labelledby="tab-macros-btn" hidden></div>
        <div class="form-buttons"></div>
      </form>
    </div>
  </div>

  <div id="result"></div>

  <script>
    window.editMode = true;
  </script>
  <script src="/admin/vendor/js-yaml.js"></script>
  <script type="module" src="/admin/create.js"></script>
</body>
</html>
